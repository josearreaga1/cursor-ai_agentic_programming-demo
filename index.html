<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Engineering Skills Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --accent: #16a34a;
      --accent-light: #dcfce7;
      --accent-dark: #15803d;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-lg: 0 4px 16px rgba(0,0,0,.10);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }

    .header-inner {
      max-width: 760px;
      margin: 0 auto;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .progress-track {
      flex: 1;
      height: 10px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #22c55e);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }

    .progress-count {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    /* ── Main ── */
    main {
      max-width: 760px;
      margin: 32px auto;
      padding: 0 24px 48px;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    /* ── Skill grid ── */
    .skill-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 540px) {
      .skill-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ── Skill card ── */
    .skill-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      user-select: none;
    }

    .skill-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-lg);
    }

    .skill-card.done {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    /* hide native checkbox */
    .skill-card input[type="checkbox"] { display: none; }

    /* custom toggle */
    .toggle {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #fff;
      transition: border-color 0.2s, background 0.2s;
    }

    .toggle svg {
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.2s, transform 0.2s;
    }

    .skill-card.done .toggle {
      background: var(--accent);
      border-color: var(--accent);
    }

    .skill-card.done .toggle svg {
      opacity: 1;
      transform: scale(1);
    }

    .skill-info { flex: 1; min-width: 0; }

    .skill-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .skill-desc {
      font-size: 0.76rem;
      color: var(--text-secondary);
      margin-top: 2px;
      line-height: 1.4;
    }

    .skill-card.done .skill-name { color: var(--accent-dark); }

    .skill-tag {
      font-size: 0.65rem;
      font-weight: 600;
      background: var(--border);
      color: var(--text-secondary);
      padding: 2px 8px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .skill-card.done .skill-tag {
      background: var(--accent-dark);
      color: #fff;
    }

    /* ── Reset button ── */
    .actions {
      margin-top: 28px;
      text-align: center;
    }

    button.reset {
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 18px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    button.reset:hover { color: #ef4444; border-color: #ef4444; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <h1>Basic Engineering Skills</h1>
      <span class="subtitle">Track your progress</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressPct">0%</div>
    </div>
    <div class="progress-count" id="progressCount">0 of 10 skills completed</div>
  </div>
</header>

<main>
  <div class="section-label">Engineering Skills</div>
  <div class="skill-grid" id="skillGrid"></div>
  <div class="actions">
    <button class="reset" id="resetBtn">Reset all progress</button>
  </div>
</main>

<script>
  const SKILLS = [
    { id: 1, name: "Version Control (Git)",        desc: "Branching, merging, rebasing, and collaborative workflows.",    tag: "Foundations" },
    { id: 2, name: "Data Structures & Algorithms",  desc: "Arrays, trees, graphs, sorting, and complexity analysis.",       tag: "CS Core"     },
    { id: 3, name: "System Design",                 desc: "Scalability, load balancing, caching, and distributed systems.", tag: "Architecture" },
    { id: 4, name: "Debugging & Problem Solving",   desc: "Reproduce, isolate, and fix bugs systematically.",              tag: "Craft"       },
    { id: 5, name: "Code Review",                   desc: "Give and receive constructive feedback on pull requests.",       tag: "Teamwork"    },
    { id: 6, name: "Testing & QA",                  desc: "Unit, integration, and end-to-end test strategies.",            tag: "Quality"     },
    { id: 7, name: "Technical Documentation",        desc: "Write clear READMEs, ADRs, and API references.",               tag: "Communication"},
    { id: 8, name: "API Design & Integration",       desc: "REST, GraphQL, authentication, and third-party SDKs.",         tag: "Backend"     },
    { id: 9, name: "Database Fundamentals",          desc: "SQL, indexing, normalization, and query optimization.",         tag: "Data"        },
    { id:10, name: "Security Best Practices",        desc: "OWASP top 10, input validation, secrets management.",          tag: "Security"    },
  ];

  const STORAGE_KEY = "bes_tracker_v1";

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function save(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = load();

  function updateProgress() {
    const done = SKILLS.filter(s => state[s.id]).length;
    const pct  = Math.round((done / SKILLS.length) * 100);
    document.getElementById("progressFill").style.width  = pct + "%";
    document.getElementById("progressPct").textContent   = pct + "%";
    document.getElementById("progressCount").textContent =
      `${done} of ${SKILLS.length} skills completed`;
  }

  function renderCards() {
    const grid = document.getElementById("skillGrid");
    grid.innerHTML = "";

    SKILLS.forEach(skill => {
      const card = document.createElement("label");
      card.className = "skill-card" + (state[skill.id] ? " done" : "");
      card.innerHTML = `
        <input type="checkbox" ${state[skill.id] ? "checked" : ""} />
        <div class="toggle">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="skill-info">
          <div class="skill-name">${skill.name}</div>
          <div class="skill-desc">${skill.desc}</div>
        </div>
        <div class="skill-tag">${skill.tag}</div>
      `;

      card.querySelector("input").addEventListener("change", e => {
        state[skill.id] = e.target.checked;
        card.classList.toggle("done", e.target.checked);
        save(state);
        updateProgress();
      });

      grid.appendChild(card);
    });
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!confirm("Reset all progress?")) return;
    state = {};
    save(state);
    document.querySelectorAll(".skill-card").forEach(c => {
      c.classList.remove("done");
      c.querySelector("input").checked = false;
    });
    updateProgress();
  });

  renderCards();
  updateProgress();
</script>
</body>
</html>
